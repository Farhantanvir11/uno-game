<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Card Battle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="menu" class="screen landing-screen">
    <div class="landing-shell">
      <div class="hero-art" aria-hidden="true"></div>

      <div class="hero-copy">
        <p class="eyebrow">Realtime card duels</p>
        <h1 class="logo">Last Card Battle</h1>
        <p class="subtitle">Create a room, share the code, and race your friends to the final play.</p>
      </div>

      <div class="menu-card">
        <input id="name" placeholder="Your name" maxlength="20">

        <div class="menu-actions">
          <button onclick="createRoom()">Create Room</button>
        </div>

        <div class="divider"><span>or jump into a room</span></div>

        <input id="roomCode" placeholder="Room Code" maxlength="5">

        <div class="menu-actions">
          <button class="secondary-btn" onclick="joinRoom()">Join Room</button>
        </div>

        <button class="bot-mode-btn" onclick="startBotMatch()" aria-label="Play against robot">
          <span class="bot-icon" aria-hidden="true">🤖</span>
          <span>Play With Bot</span>
        </button>
      </div>
    </div>
  </div>

  <div id="lobby" class="screen panel" style="display:none;">
    <h2 id="roomTitle"></h2>
    <p id="roomStatus"></p>

    <label for="cardCount">Starting cards</label>
    <select id="cardCount">
      <option value="5">5</option>
      <option value="7" selected>7</option>
      <option value="10">10</option>
    </select>

    <button id="startBtn" onclick="startGame()">Start Game</button>

    <h3>Players</h3>
    <ul id="lobbyPlayers"></ul>
  </div>

  <div id="game" class="screen" style="display:none;">
    <div class="hud">
      <div id="roomLabel"></div>
      <div class="hud-meta">
        <button id="muteBtn" class="hud-btn" onclick="toggleMute()">Sound: On</button>
        <div id="timer">Time: -</div>
      </div>
    </div>

    <div class="controls">
      <button id="drawBtn" onclick="drawCard()">Draw Card</button>
      <button id="unoBtn" onclick="callUNO()" style="display:none;">UNO!</button>
    </div>

    <div id="stackInfo"></div>
    <div id="topCard"></div>
    <div id="players"></div>

    <div id="colorPicker" style="display:none;">
      <button class="color-btn red" onclick="chooseColor('red')" aria-label="Choose red"></button>
      <button class="color-btn green" onclick="chooseColor('green')" aria-label="Choose green"></button>
      <button class="color-btn blue" onclick="chooseColor('blue')" aria-label="Choose blue"></button>
      <button class="color-btn yellow" onclick="chooseColor('yellow')" aria-label="Choose yellow"></button>
    </div>

    <div id="deckDecisionModal" class="overlay" style="display:none;">
      <div class="overlay-card">
        <h3>Main Deck Empty</h3>
        <p id="deckDecisionText"></p>
        <div id="deckDecisionActions" class="overlay-actions">
          <button id="shuffleDeckBtn" onclick="resolveDeckDecision('shuffle')">Shuffle Used Cards</button>
          <button id="declareWinnerBtn" onclick="resolveDeckDecision('declareWinner')">Declare Winner</button>
        </div>
      </div>
    </div>
  </div>

  <div id="hand"></div>
  <div id="toast" class="toast" aria-live="polite"></div>

  <div id="winnerModal" class="overlay winner-overlay" style="display:none;">
    <div class="overlay-card winner-card">
      <p class="winner-tag">Champion Crowned</p>
      <h2 id="winnerName"></h2>
      <p class="winner-subtitle">The table is clear. A new battle can begin whenever your squad is ready.</p>
      <div class="winner-burst" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <button id="winnerCloseBtn" onclick="closeWinnerModal()">Back To Lobby</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
